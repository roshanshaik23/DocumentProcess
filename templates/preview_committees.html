<!DOCTYPE html>
<html>
<head>
    <title>Preview</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 1200px;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #4e73df;
            color: white;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff7e5f;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Committees Preview</h2>

    <!-- SAFE CHECK -->
    {% if table %}
        <div>
            {{ table | safe }}
        </div>
    {% else %}
        <p>No data available</p>
    {% endif %}

    <form action="/confirm" method="post">
        <input type="hidden" name="table_name" value="{{ table_name or '' }}">
        <input type="hidden" name="module" value="{{ module or '' }}">
        <input type="hidden" name="file_path" value="{{ file_path or '' }}">

        <button class="btn">Confirm & Download</button>
    </form>

</div>

</body>
</html>
